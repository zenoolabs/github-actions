name: "Build and publish image"

on:
  workflow_call:
    inputs:
      region:
        required: true
        type: string
      image:
        required: true
        type: string
      version:
        required: true
        type: string
      ref:
        required: false
        type: string
jobs:
  buildImage:
    name: "Build docker image"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ inputs.region }}
    steps:
      - name: "Checkout project using ref ${{ inputs.ref }}"
        if: ${{ inputs.ref != '' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: "Checkout project"
        if: ${{ inputs.ref == '' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Setup JDK 11"
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: 11
          cache: "gradle"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::323683957335:role/ecr-assume-role-github-actions
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: "323683957335"

      - name: "Build and publish Docker image"
        run: |
          echo "Pushing version ${{ inputs.version }} to ${{ inputs.region }}"
          ./gradlew jib -PgithubRun -Djib.to.image="${{ inputs.image }}:${{ inputs.version }}"

      - name: "Create summary"
        run: |
          echo "Published version ${{ inputs.version }} to ${{ inputs.region }}" >> $GITHUB_STEP_SUMMARY
